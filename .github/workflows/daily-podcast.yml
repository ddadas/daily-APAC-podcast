name: Daily APAC Podcast Generator

on:
  schedule:
    # 5:00 AM Singapore time (SGT, UTC+8) = 21:00 UTC the previous day.
    # We start at 5 AM SGT so the episode is generated, uploaded as a GitHub
    # Release, and the RSS feed is regenerated before 6:30 AM SGT. Spotify
    # polls the feed served by GitHub Pages.
    - cron: '0 21 * * *'

  # Allow manual trigger from the Actions tab.
  workflow_dispatch:

permissions:
  # Required to create releases, upload assets, and commit docs/podcast.rss.
  contents: write

jobs:
  generate-podcast:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate episode and publish to GitHub Releases + RSS
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # GITHUB_TOKEN must be passed explicitly — it isn't inherited by
          # the script's process automatically. Same for the repo slug.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python podcast_generator.py

      - name: Commit regenerated podcast.rss
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          if [[ -n "$(git status --porcelain docs/podcast.rss)" ]]; then
            git add docs/podcast.rss
            git commit -m "Update podcast.rss for $(date -u +'%Y-%m-%d')"
            git push
          else
            echo "podcast.rss unchanged — nothing to commit."
          fi

      - name: Upload local artifacts (script, sources, Word doc)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: podcast-episodes-${{ github.run_number }}
          path: podcast_episodes/
          retention-days: 30
