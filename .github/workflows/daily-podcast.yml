name: Daily APAC Podcast Generator

on:
  schedule:
    # 5:00 AM Singapore time (SGT, UTC+8) = 21:00 UTC the previous day.
    # We start at 5 AM SGT so the episode is generated, uploaded to Buzzsprout,
    # and ingested by Spotify well before 6:30 AM SGT.
    - cron: '0 21 * * *'

  # Allow manual trigger from the Actions tab.
  workflow_dispatch:

jobs:
  generate-podcast:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate podcast and publish to Buzzsprout
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # Buzzsprout auto-publish (drives Spotify via the existing RSS feed).
          # The v18 podcast_generator.py uploads the MP3 with rich show notes
          # built from the day's featured stories. No separate workflow step needed.
          BUZZSPROUT_API_TOKEN: ${{ secrets.BUZZSPROUT_API_TOKEN }}
          BUZZSPROUT_PODCAST_ID: ${{ secrets.BUZZSPROUT_PODCAST_ID || '2606352' }}
          BUZZSPROUT_PUBLISH: '1'
        run: |
          python podcast_generator.py

      - name: Upload podcast artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: podcast-episodes-${{ github.run_number }}
          path: podcast_episodes/
          retention-days: 30
