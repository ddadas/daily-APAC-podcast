name: Daily APAC Podcast Generator

on:
  schedule:
    # Runs at 5:55 AM Singapore time (9:55 PM UTC previous day)
    # Singapore is UTC+8
    - cron: '55 21 * * *'

  # Allow manual trigger
  workflow_dispatch:

jobs:
  generate-podcast:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate podcast
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python podcast_generator.py

      - name: Upload podcast artifacts
        uses: actions/upload-artifact@v4
        with:
          name: podcast-episodes-${{ github.run_number }}
          path: podcast_episodes/
          retention-days: 30

      - name: Commit and push generated files (optional)
        if: false  # Set to true if you want to commit episodes to repo
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add podcast_episodes/
          git commit -m "Add podcast episode - $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push
